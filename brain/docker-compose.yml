services:
  # --- EMAIL SORTER ---
  email-sorter:
    build: ./email-sorter
    container_name: email_sorter
    environment:
      - OLLAMA_HOST=http://<IP_ADDRESS>:11434
    volumes:
      - ./email-sorter/config/settings.json:/app/settings.json
    restart: unless-stopped

  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./duplicati/config:/config
      - ./duplicati/backups:/backups
      - <PATH_TO>:/source:ro 
    ports:
      - "8200:8200"
    restart: unless-stopped
